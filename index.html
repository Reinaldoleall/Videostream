<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow - Agenda Colaborativa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        * { font-family: 'Inter', sans-serif; }
        .task-card {
            transition: all 0.3s ease;
        }
        .task-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
        }
        .status-active {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen">
    <!-- Loading Screen -->
    <div id="loadingScreen" class="fixed inset-0 bg-white z-50 flex items-center justify-center">
        <div class="text-center">
            <i class="fas fa-tasks text-6xl text-indigo-600 animate-bounce"></i>
            <p class="mt-4 text-gray-600">Carregando TaskFlow...</p>
        </div>
    </div>

    <!-- Login Container -->
    <div id="loginContainer" class="min-h-screen flex items-center justify-center px-4 hidden">
        <div class="bg-white rounded-2xl shadow-2xl p-8 max-w-md w-full">
            <div class="text-center mb-8">
                <i class="fas fa-tasks text-5xl text-indigo-600"></i>
                <h1 class="text-3xl font-bold mt-4 text-gray-800">TaskFlow</h1>
                <p class="text-gray-500 mt-2">Agenda Colaborativa em Tempo Real</p>
            </div>
            <button onclick="signInWithGoogle()" class="w-full bg-white border-2 border-gray-200 hover:border-indigo-500 text-gray-700 font-semibold py-3 px-4 rounded-xl transition-all duration-300 flex items-center justify-center gap-3">
                <img src="https://www.google.com/favicon.ico" alt="Google" class="w-5 h-5">
                Entrar com Google
            </button>
        </div>
    </div>

    <!-- Main App Container -->
    <div id="appContainer" class="hidden">
        <!-- Header -->
        <div class="bg-white shadow-lg sticky top-0 z-20">
            <div class="container mx-auto px-4 py-4 flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <i class="fas fa-tasks text-2xl text-indigo-600"></i>
                    <h1 class="text-2xl font-bold text-gray-800">TaskFlow</h1>
                </div>
                <div class="flex items-center gap-4">
                    <div class="flex items-center gap-2 bg-gray-100 rounded-full px-4 py-2">
                        <i class="fas fa-user-circle text-gray-600"></i>
                        <span id="userName" class="text-sm font-medium text-gray-700"></span>
                    </div>
                    <button onclick="logout()" class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg transition">
                        <i class="fas fa-sign-out-alt"></i> Sair
                    </button>
                </div>
            </div>
        </div>

        <div class="container mx-auto px-4 py-8">
            <!-- Date Navigation -->
            <div class="bg-white rounded-xl shadow-lg p-6 mb-6">
                <div class="flex items-center justify-between flex-wrap gap-4">
                    <div class="flex items-center gap-4">
                        <button onclick="changeDate(-1)" class="bg-indigo-100 hover:bg-indigo-200 text-indigo-700 px-4 py-2 rounded-lg transition">
                            <i class="fas fa-chevron-left"></i> Anterior
                        </button>
                        <input type="date" id="datePicker" class="border-2 border-gray-200 rounded-lg px-4 py-2 focus:border-indigo-500 outline-none">
                        <button onclick="changeDate(1)" class="bg-indigo-100 hover:bg-indigo-200 text-indigo-700 px-4 py-2 rounded-lg transition">
                            Próximo <i class="fas fa-chevron-right"></i>
                        </button>
                    </div>
                    <button onclick="showAddTaskModal()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-lg transition shadow-md">
                        <i class="fas fa-plus"></i> Nova Tarefa
                    </button>
                </div>
            </div>

            <div class="grid lg:grid-cols-3 gap-6">
                <!-- Tasks Column -->
                <div class="lg:col-span-2">
                    <div class="bg-white rounded-xl shadow-lg p-6">
                        <h2 class="text-xl font-bold mb-4 text-gray-800">
                            <i class="fas fa-list-check text-indigo-600"></i> Tarefas do Dia
                        </h2>
                        <div id="tasksList" class="space-y-3 max-h-[600px] overflow-y-auto"></div>
                    </div>
                </div>

                <!-- Files & Active Users Column -->
                <div class="space-y-6">
                    <!-- Active Users Card -->
                    <div class="bg-white rounded-xl shadow-lg p-6">
                        <h3 class="text-lg font-bold mb-4 text-gray-800">
                            <i class="fas fa-users text-green-600"></i> Trabalhando Agora
                        </h3>
                        <div id="activeUsersList" class="space-y-2 max-h-[200px] overflow-y-auto"></div>
                    </div>

                    <!-- Shared Files Card -->
                    <div class="bg-white rounded-xl shadow-lg p-6">
                        <div class="flex justify-between items-center mb-4">
                            <h3 class="text-lg font-bold text-gray-800">
                                <i class="fas fa-paperclip text-blue-600"></i> Arquivos Compartilhados
                            </h3>
                            <button onclick="document.getElementById('fileInput').click()" class="bg-blue-500 hover:bg-blue-600 text-white px-3 py-1 rounded-lg text-sm transition">
                                <i class="fas fa-upload"></i> Upload
                            </button>
                            <input type="file" id="fileInput" class="hidden" multiple onchange="uploadFiles(this)">
                        </div>
                        <div id="filesList" class="space-y-2 max-h-[300px] overflow-y-auto"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Task Modal -->
    <div id="taskModal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-2xl max-w-md w-full p-6">
            <h3 class="text-xl font-bold mb-4">Nova Tarefa</h3>
            <input type="text" id="taskTitle" placeholder="Título da tarefa" class="w-full border-2 border-gray-200 rounded-lg px-4 py-2 mb-3 focus:border-indigo-500 outline-none">
            <textarea id="taskDesc" placeholder="Descrição" rows="3" class="w-full border-2 border-gray-200 rounded-lg px-4 py-2 mb-3 focus:border-indigo-500 outline-none"></textarea>
            <select id="taskPriority" class="w-full border-2 border-gray-200 rounded-lg px-4 py-2 mb-3 focus:border-indigo-500 outline-none">
                <option value="alta">🔴 Alta Prioridade</option>
                <option value="media">🟡 Média Prioridade</option>
                <option value="baixa">🟢 Baixa Prioridade</option>
            </select>
            <input type="email" id="inviteEmail" placeholder="Convidar por email (opcional)" class="w-full border-2 border-gray-200 rounded-lg px-4 py-2 mb-4 focus:border-indigo-500 outline-none">
            <div class="flex gap-3">
                <button onclick="createTask()" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white py-2 rounded-lg transition">Criar</button>
                <button onclick="closeModal('taskModal')" class="flex-1 bg-gray-300 hover:bg-gray-400 text-gray-700 py-2 rounded-lg transition">Cancelar</button>
            </div>
        </div>
    </div>

    <script>
        // Firebase Configuration
            const firebaseConfig = {
                apiKey: "AIzaSyD8FxHqt1g2V-mmureRPQyYe6QCuRSieGI",
                authDomain: "marketplaceconnect-af26d.firebaseapp.com",
                databaseURL: "https://marketplaceconnect-af26d-default-rtdb.firebaseio.com",
                projectId: "marketplaceconnect-af26d",
                storageBucket: "marketplaceconnect-af26d.firebasestorage.app",
                messagingSenderId: "768552546759",
                appId: "1:768552546759:web:4367fc4a161ecf90c469e2",
                measurementId: "G-7HHR78MHDP"
            };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const storage = firebase.storage();

        let currentUser = null;
        let currentDate = new Date().toISOString().split('T')[0];

        // Auth State Observer
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('loadingScreen').classList.add('hidden');
                document.getElementById('loginContainer').classList.add('hidden');
                document.getElementById('appContainer').classList.remove('hidden');
                document.getElementById('userName').textContent = user.displayName || user.email;
                
                await initializeUser();
                loadTasks();
                loadFiles();
                setupRealtimeListeners();
                setupActiveStatus();
            } else {
                document.getElementById('loadingScreen').classList.add('hidden');
                document.getElementById('loginContainer').classList.remove('hidden');
                document.getElementById('appContainer').classList.add('hidden');
            }
        });

        async function initializeUser() {
            await db.collection('users').doc(currentUser.uid).set({
                email: currentUser.email,
                name: currentUser.displayName,
                photoURL: currentUser.photoURL,
                lastActive: firebase.firestore.FieldValue.serverTimestamp(),
                online: true
            }, { merge: true });
        }

        function setupActiveStatus() {
            const userRef = db.collection('users').doc(currentUser.uid);
            
            const updateStatus = () => {
                userRef.update({
                    lastActive: firebase.firestore.FieldValue.serverTimestamp(),
                    online: true
                });
            };
            
            updateStatus();
            setInterval(updateStatus, 30000);
            
            window.addEventListener('beforeunload', () => {
                userRef.update({ online: false });
            });
        }

        function setupRealtimeListeners() {
            // Listen to active users
            db.collection('users').where('online', '==', true)
                .onSnapshot((snapshot) => {
                    const activeUsers = [];
                    snapshot.forEach(doc => {
                        if (doc.id !== currentUser.uid) {
                            activeUsers.push(doc.data());
                        }
                    });
                    displayActiveUsers(activeUsers);
                });
            
            // Listen to tasks for current date
            db.collection('tasks')
                .where('date', '==', currentDate)
                .orderBy('priority', 'desc')
                .onSnapshot(() => loadTasks());
        }

        async function loadTasks() {
            const tasksSnapshot = await db.collection('tasks')
                .where('date', '==', currentDate)
                .orderBy('priorityValue', 'desc')
                .get();
            
            const tasks = [];
            tasksSnapshot.forEach(doc => {
                tasks.push({ id: doc.id, ...doc.data() });
            });
            
            displayTasks(tasks);
        }

        function displayTasks(tasks) {
            const container = document.getElementById('tasksList');
            if (tasks.length === 0) {
                container.innerHTML = '<div class="text-center text-gray-500 py-8">Nenhuma tarefa para este dia</div>';
                return;
            }
            
            container.innerHTML = tasks.map(task => `
                <div class="task-card bg-gray-50 rounded-lg p-4 border-l-4 ${getPriorityColor(task.priority)}">
                    <div class="flex justify-between items-start">
                        <div class="flex-1">
                            <div class="flex items-center gap-2 mb-2">
                                <h4 class="font-semibold text-gray-800">${escapeHtml(task.title)}</h4>
                                <span class="text-xs px-2 py-1 rounded-full ${getPriorityBadge(task.priority)}">${task.priority}</span>
                                ${task.activeUser ? `<span class="text-xs bg-green-100 text-green-700 px-2 py-1 rounded-full"><i class="fas fa-play"></i> ${task.activeUser} está trabalhando</span>` : ''}
                            </div>
                            <p class="text-sm text-gray-600 mb-2">${escapeHtml(task.description || 'Sem descrição')}</p>
                            <div class="flex items-center gap-4 text-xs text-gray-500">
                                <span><i class="fas fa-user"></i> Criado por: ${task.createdBy}</span>
                                ${task.assignedTo ? `<span><i class="fas fa-envelope"></i> Convidado: ${task.assignedTo}</span>` : ''}
                                ${task.completedBy ? `<span class="text-green-600"><i class="fas fa-check-circle"></i> Concluído por: ${task.completedBy}</span>` : ''}
                            </div>
                        </div>
                        <div class="flex flex-col gap-2">
                            ${!task.completed ? `
                                <button onclick="startTask('${task.id}')" class="bg-green-500 hover:bg-green-600 text-white px-3 py-1 rounded text-sm">
                                    <i class="fas fa-play"></i> Iniciar
                                </button>
                                <button onclick="completeTask('${task.id}')" class="bg-blue-500 hover:bg-blue-600 text-white px-3 py-1 rounded text-sm">
                                    <i class="fas fa-check"></i> Concluir
                                </button>
                            ` : `
                                <span class="text-green-600 text-sm"><i class="fas fa-check-circle"></i> Concluída</span>
                            `}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function startTask(taskId) {
            await db.collection('tasks').doc(taskId).update({
                activeUser: currentUser.displayName || currentUser.email,
                activeStart: firebase.firestore.FieldValue.serverTimestamp()
            });
            
            // Send notification
            showNotification(`Você iniciou a tarefa`, 'success');
        }

        async function completeTask(taskId) {
            await db.collection('tasks').doc(taskId).update({
                completed: true,
                completedBy: currentUser.displayName || currentUser.email,
                completedAt: firebase.firestore.FieldValue.serverTimestamp(),
                activeUser: null
            });
            showNotification('Tarefa concluída!', 'success');
        }

        async function createTask() {
            const title = document.getElementById('taskTitle').value;
            const desc = document.getElementById('taskDesc').value;
            const priority = document.getElementById('taskPriority').value;
            const inviteEmail = document.getElementById('inviteEmail').value;
            
            if (!title) {
                showNotification('Digite um título para a tarefa', 'error');
                return;
            }
            
            const priorityValue = { alta: 3, media: 2, baixa: 1 }[priority];
            
            await db.collection('tasks').add({
                title: title,
                description: desc,
                priority: priority,
                priorityValue: priorityValue,
                date: currentDate,
                createdBy: currentUser.displayName || currentUser.email,
                createdByUid: currentUser.uid,
                createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                completed: false,
                assignedTo: inviteEmail || null,
                activeUser: null
            });
            
            if (inviteEmail) {
                // Notify invited user (simplified)
                console.log(`Convidado ${inviteEmail} para a tarefa`);
            }
            
            closeModal('taskModal');
            document.getElementById('taskTitle').value = '';
            document.getElementById('taskDesc').value = '';
            document.getElementById('inviteEmail').value = '';
            showNotification('Tarefa criada com sucesso!', 'success');
        }

        async function uploadFiles(input) {
            const files = Array.from(input.files);
            for (const file of files) {
                const storageRef = storage.ref(`files/${currentDate}/${Date.now()}_${file.name}`);
                await storageRef.put(file);
                const url = await storageRef.getDownloadURL();
                
                await db.collection('files').add({
                    name: file.name,
                    url: url,
                    size: file.size,
                    type: file.type,
                    uploadedBy: currentUser.displayName || currentUser.email,
                    uploadedAt: firebase.firestore.FieldValue.serverTimestamp(),
                    date: currentDate
                });
            }
            showNotification(`${files.length} arquivo(s) enviado(s)!`, 'success');
            loadFiles();
        }

        async function loadFiles() {
            const filesSnapshot = await db.collection('files')
                .orderBy('uploadedAt', 'desc')
                .limit(20)
                .get();
            
            const files = [];
            filesSnapshot.forEach(doc => {
                files.push({ id: doc.id, ...doc.data() });
            });
            
            displayFiles(files);
        }

        function displayFiles(files) {
            const container = document.getElementById('filesList');
            if (files.length === 0) {
                container.innerHTML = '<div class="text-center text-gray-500 py-4">Nenhum arquivo compartilhado</div>';
                return;
            }
            
            container.innerHTML = files.map(file => `
                <div class="bg-gray-50 rounded-lg p-3 flex justify-between items-center">
                    <div class="flex items-center gap-2 flex-1">
                        <i class="fas ${getFileIcon(file.type)} text-gray-600"></i>
                        <span class="text-sm truncate flex-1">${escapeHtml(file.name)}</span>
                        <span class="text-xs text-gray-500">${formatFileSize(file.size)}</span>
                    </div>
                    <a href="${file.url}" download class="text-indigo-600 hover:text-indigo-800">
                        <i class="fas fa-download"></i>
                    </a>
                </div>
            `).join('');
        }

        function displayActiveUsers(users) {
            const container = document.getElementById('activeUsersList');
            if (users.length === 0) {
                container.innerHTML = '<div class="text-center text-gray-500 py-4">Ninguém ativo no momento</div>';
                return;
            }
            
            container.innerHTML = users.map(user => `
                <div class="flex items-center gap-3 p-2 bg-green-50 rounded-lg">
                    <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                    <span class="text-sm font-medium">${user.name || user.email}</span>
                </div>
            `).join('');
        }

// Substitua a função signInWithGoogle por esta:
async function signInWithGoogle() {
    const provider = new firebase.auth.GoogleAuthProvider();
    
    try {
        // Usando popup em vez de redirect - MAIS ESTÁVEL
        const result = await firebase.auth().signInWithPopup(provider);
        console.log('Usuário logado:', result.user);
        showNotification('Login realizado com sucesso!', 'success');
    } catch (error) {
        console.error('Erro detalhado:', error);
        
        // Fallback: tenta redirect se popup falhar
        if (error.code === 'auth/popup-blocked') {
            showNotification('Popup bloqueado! Clique novamente.', 'error');
            await firebase.auth().signInWithRedirect(provider);
        } else {
            showNotification('Erro: ' + error.message, 'error');
        }
    }
}

        function logout() {
            auth.signOut();
        }

        function changeDate(delta) {
            const date = new Date(currentDate);
            date.setDate(date.getDate() + delta);
            currentDate = date.toISOString().split('T')[0];
            document.getElementById('datePicker').value = currentDate;
            loadTasks();
        }

        function showAddTaskModal() {
            document.getElementById('taskModal').classList.remove('hidden');
            document.getElementById('taskModal').classList.add('flex');
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.add('hidden');
            document.getElementById(modalId).classList.remove('flex');
        }

        function getPriorityColor(priority) {
            return { alta: 'border-red-500', media: 'border-yellow-500', baixa: 'border-green-500' }[priority];
        }

        function getPriorityBadge(priority) {
            return { alta: 'bg-red-100 text-red-700', media: 'bg-yellow-100 text-yellow-700', baixa: 'bg-green-100 text-green-700' }[priority];
        }

        function getFileIcon(type) {
            if (type.includes('pdf')) return 'fa-file-pdf text-red-500';
            if (type.includes('image')) return 'fa-file-image text-blue-500';
            if (type.includes('excel') || type.includes('sheet')) return 'fa-file-excel text-green-500';
            return 'fa-file text-gray-500';
        }

        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / 1048576).toFixed(1) + ' MB';
        }

        function showNotification(message, type) {
            const notification = document.createElement('div');
            notification.className = `fixed top-20 right-4 z-50 px-6 py-3 rounded-lg shadow-lg animate-bounce ${type === 'error' ? 'bg-red-500' : 'bg-green-500'} text-white`;
            notification.innerHTML = `<i class="fas ${type === 'error' ? 'fa-exclamation-triangle' : 'fa-check-circle'} mr-2"></i>${message}`;
            document.body.appendChild(notification);
            setTimeout(() => notification.remove(), 3000);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Set today's date in picker
        document.getElementById('datePicker').value = currentDate;
        document.getElementById('datePicker').addEventListener('change', (e) => {
            currentDate = e.target.value;
            loadTasks();
        });

        // Close modal on click outside
        document.getElementById('taskModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('taskModal')) closeModal('taskModal');
        });
    </script>
</body>
</html>
